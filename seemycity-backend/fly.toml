# Fly.io configuration for the SeeMyCity backend API.
#
# NOT YET DEPLOYED — to launch:
#   fly apps create seemycity-backend
#   fly secrets set -a seemycity-backend \
#     DB_HOST=seemycity-db.internal DB_PORT=5432 DB_USER=postgres \
#     DB_PASSWORD=... DB_NAME=postgres \
#     CORS_ALLOWED_ORIGINS=https://seemycity-frontend.fly.dev
#   fly deploy -a seemycity-backend
#
# The database is reached over Fly private networking (seemycity-db.internal),
# so no proxy or public exposure of Postgres is needed.

app = 'seemycity-backend'
primary_region = 'jnb'

[build]

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
