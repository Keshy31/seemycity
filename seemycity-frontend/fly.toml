# fly.toml app configuration file generated for seemycity-frontend on 2025-04-08T20:40:36+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'seemycity-frontend'
primary_region = 'jnb'

# Vite inlines env at build time — deploy with build args:
#   fly deploy \
#     --build-arg VITE_API_BASE_URL=https://seemycity-backend.fly.dev \
#     --build-arg VITE_MAPTILER_API_KEY=...
[build]

# nginx serves the static SPA on port 80 (see nginx.conf for SPA fallback)
[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = true # stop when idle
  auto_start_machines = true # start on new requests
  min_machines_running = 0
  processes = ["app"]

# Keep the vm section for defining machine resources
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
