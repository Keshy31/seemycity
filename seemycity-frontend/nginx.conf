server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/javascript application/json text/css text/plain image/svg+xml;

    # SvelteKit emits content-hashed assets under /_app/immutable — cache forever.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths (e.g. /CPT, /compare/CPT,JHB) load the shell
    # and the client router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
